name: Build ExynNix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ARM64 APK — llama.cpp + Vulkan (Exynos 990)
    runs-on: ubuntu-latest
    timeout-minutes: 60   # llama.cpp compile takes ~20-30 min

    steps:
      # ── Checkout WITH submodules ────────────────────────────────────────────
      - name: Checkout (with llama.cpp submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls llama.cpp
          fetch-depth: 1

      # ── Java 17 ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle 8.9 ──────────────────────────────────────────────────────────
      - name: Install Gradle 8.9
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle-dist
          echo "/opt/gradle-dist/gradle-8.9/bin" >> $GITHUB_PATH

      # ── Android SDK + NDK ───────────────────────────────────────────────────
      - name: Detect and configure NDK
        run: |
          NDK_VER=$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)
          echo "NDK_VERSION=$NDK_VER" >> $GITHUB_ENV
          echo "Detected NDK: $NDK_VER"
          # Install cmake
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true

      - name: Configure local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/$NDK_VERSION" >> local.properties
          cat local.properties

      # ── Cache llama.cpp build artifacts (speeds up re-runs) ─────────────────
      - name: Cache native build
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: native-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**', 'app/src/main/cpp/llama/**/*.h') }}
          restore-keys: native-${{ runner.os }}-

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build Debug APK (with llama.cpp + Vulkan)
        run: |
          gradle assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.native.buildOutput=verbose

      # ── Collect & Upload ─────────────────────────────────────────────────────
      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ExynNix-Debug-APK
          path: artifacts/*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ExynNix APK — Real Inference Build" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.apk; do
            echo "| $(basename $f) | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backends:** CPU XNNPACK + GPU Vulkan (Mali-G77) + NNAPI" >> $GITHUB_STEP_SUMMARY
          echo "**llama.cpp:** included (real token generation)" >> $GITHUB_STEP_SUMMARY
          echo "**ABI:** arm64-v8a | **NDK:** $NDK_VERSION | **minSdk:** 29" >> $GITHUB_STEP_SUMMARY
