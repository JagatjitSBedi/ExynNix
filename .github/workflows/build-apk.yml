name: Build ExynNix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ARM64 APK (Exynos 990)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Install Gradle manually (bypasses broken wrapper jar) ───────────────
      - name: Install Gradle 8.9
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle-dist
          echo "GRADLE_HOME=/opt/gradle-dist/gradle-8.9" >> $GITHUB_ENV
          echo "/opt/gradle-dist/gradle-8.9/bin" >> $GITHUB_PATH

      # ── Android SDK ─────────────────────────────────────────────────────────
      # ubuntu-latest already has ANDROID_HOME=/usr/local/lib/android/sdk
      - name: Install NDK r26c and CMake
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            --sdk_root=$ANDROID_HOME

      # ── local.properties ─────────────────────────────────────────────────────
      - name: Configure local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/26.3.11579264" >> local.properties
          cat local.properties

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          gradle assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.native.buildOutput=verbose

      - name: Build Release APK
        run: |
          gradle assembleRelease \
            --no-daemon

      # ── Collect APKs ─────────────────────────────────────────────────────────
      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      # ── Upload ───────────────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ExynNix-Debug-APK
          path: artifacts/*debug*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ExynNix-Release-APK
          path: artifacts/*release*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ExynNix Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.apk; do
            echo "| $(basename $f) | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
          echo "**ABI:** arm64-v8a | **minSdk:** 29 | **Target:** Exynos 990" >> $GITHUB_STEP_SUMMARY
