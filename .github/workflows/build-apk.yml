name: Build ExynNix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ARM64 APK (Exynos 990)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Install Gradle 8.9 directly (avoids wrapper jar issues)
      - name: Install Gradle 8.9
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle-dist
          echo "/opt/gradle-dist/gradle-8.9/bin" >> $GITHUB_PATH

      # Detect which NDK versions are already installed on the runner
      - name: Detect NDK version
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDK found"
          # Pick whichever NDK is available (runner has one pre-installed)
          NDK_VER=$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)
          echo "NDK_VERSION=$NDK_VER" >> $GITHUB_ENV
          echo "Detected NDK: $NDK_VER"
          # Also install cmake if needed
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1" --sdk_root=$ANDROID_HOME || true

      - name: Configure local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/$NDK_VERSION" >> local.properties
          cat local.properties

      # Patch build.gradle.kts to use detected NDK version
      - name: Patch NDK version in build.gradle.kts
        run: |
          sed -i "s/android.ndkVersion \"[^\"]*\"/android.ndkVersion \"$NDK_VERSION\"/" app/build.gradle.kts || true
          # Add ndkVersion line if not present
          if ! grep -q "ndkVersion" app/build.gradle.kts; then
            sed -i "/compileSdk = 35/a\\    ndkVersion = \"$NDK_VERSION\"" app/build.gradle.kts
          fi
          echo "=== build.gradle.kts defaultConfig section ==="
          grep -A5 "defaultConfig" app/build.gradle.kts | head -20

      - name: Build Debug APK
        run: |
          gradle assembleDebug --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ExynNix-Debug-APK
          path: artifacts/*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ExynNix APK" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.apk; do
            echo "- $(basename $f) — $(du -sh $f | cut -f1)" >> $GITHUB_STEP_SUMMARY
          done
          echo "**ABI:** arm64-v8a | **NDK:** $NDK_VERSION | **minSdk:** 29" >> $GITHUB_STEP_SUMMARY
